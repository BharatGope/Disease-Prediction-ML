<!DOCTYPE html>
<html>
<head>
    <title>Disease Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static',
    filename='css/style.css') }}">
</head>
<body>
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="container">
        <div class="card">
            <h1>🩺 Diabetes Prediction System</h1>
            <p class="subtitle">
                Enter patient health details to predict diabetes risk using Machine Learning.
            </p>
            <form action="/predict" method="post">

                <div class="input-group">
                    <label>Pregnancies</label>
                    <input type="number" name="pregnancies" required>
                </div>
            
                <div class="input-group">
                    <label>Glucose Level</label>
                    <input type="number" name="glucose" required>
                </div>
            
                <div class="input-group">
                    <label>Blood Pressure</label>
                    <input type="number" name="bloodpressure" required>
                </div>
            
                <div class="input-group">
                    <label>Skin Thickness</label>
                    <input type="number" name="skinthickness" required>
                </div>
            
                <div class="input-group">
                    <label>Insulin</label>
                    <input type="number" name="insulin" required>
                </div>
            
                <div class="input-group">
                    <label>BMI</label>
                    <input type="number" step="0.01" name="bmi" required>
                </div>
            
                <div class="input-group">
                    <label>Diabetes Pedigree Function</label>
                    <input type="number" step="0.01" name="dpf" required>
                </div>
            
                <div class="input-group">
                    <label>Age</label>
                    <input type="number" name="age" required>
                </div>
            
                <button type="submit">Predict Disease Risk</button>
            
                <p class="note">
                    Note: This model was trained on the Pima Indians Diabetes Dataset, which contains female patient data.
                </p>
                
            </form>
            
        </div>
    </div>
</body> 
</html>
