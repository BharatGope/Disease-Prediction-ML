<!DOCTYPE html>
<html>
<head>
    <title>Disease Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static',
    filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🩺 Diabetes Prediction System</h1>
            <p class="subtitle">
                Enter patient health details to predict diabetes risk using Machine Learning.
            </p>

            <form action="/predict" method="post">

                <input type="number" name="pregnancies" placeholder="Pregnancies" required>
                <input type="number" name="glucose" placeholder="Glucose Level" required>
                <input type="number" name="bloodpressure" placeholder="Blood Pressure" required>
                <input type="number" name="skinthickness" placeholder="Skin Thickness" required>
                <input type="number" name="insulin" placeholder="Insulin" required>
                <input type="number" step="0.01" name="bmi" placeholder="BMI" required>
                <input type="number" step="0.01" name="dpf" placeholder="Diabetes Pedigree Function" required>
                <input type="number" name="age" placeholder="Age" required>

                <button type="submit">Predict Disease Risk</button>

            </form>
        </div>
    </div>
</body>
</html>
